<!DOCTYPE html>
<html>
<head>
<title>Terminal</title>
<style>
body{
background:black;
color:#00ff00;
font-family:Consolas, monospace;
padding:10px;
font-size:14px;
overflow:hidden;
}

#cursor{
display:inline-block;
width:10px;
background:#00ff00;
margin-left:4px;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0;}
}
</style>
</head>
<body>

<div id="cmd"></div><span id="cursor"></span>

<script>

let cmd = document.getElementById("cmd");

function randomFile(){
let names=["system","data","config","backup","photo","video","secret","temp","cache"];
let ext=[".dat",".sys",".txt",".log",".bin",".dll"];
return "C:\\\\"+names[Math.floor(Math.random()*names.length)]+"\\\\file"+Math.floor(Math.random()*9999)+ext[Math.floor(Math.random()*ext.length)];
}

let count = 0;

function scan(){

if(count < 250){

let line = document.createElement("div");
line.textContent = randomFile();
cmd.appendChild(line);

window.scrollTo(0,document.body.scrollHeight);

count++;

setTimeout(scan,10);

}else{

setTimeout(upload,2000);

}

}

function upload(){

let lines=[
"",
"Preparing data...",
"Compressing files...",
"Uploading data...",
"...",
"...",
"...",
"Transfer complete.",
"Data uploaded."
];

let i=0;

function next(){
if(i < lines.length){

let div=document.createElement("div");
div.textContent=lines[i];
cmd.appendChild(div);

window.scrollTo(0,document.body.scrollHeight);

i++;

setTimeout(next,400);

}
}

next();

}

scan();

</script>

</body>
</html>
